<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>妈妈看单 - 诊断模式</title>
  <style>
    body { font-family: sans-serif; background: #eef5ff; padding: 20px; }
    h2 { color: #1e40af; }
    .status { margin: 10px 0; font-size: 14px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    pre { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 10px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }
    .order { background: white; border-radius: 12px; padding: 14px; margin: 10px 0; border-left: 4px solid #f59e0b; }
    button { margin-right: 6px; padding: 6px 12px; border-radius: 14px; border: none; color: white; }
    .accept { background: #2563eb; } .reject { background: #ef4444; } .done { background: #10b981; }
    .refresh-btn { background: #64748b; color: white; padding: 10px 20px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h2>📋 妈妈看单 (诊断版)</h2>
  <div id="status" class="status">⏳ 正在连接…</div>
  <button class="refresh-btn" onclick="fetchOrders()">🔄 手动刷新</button>
  
  <h3>📦 数据库原始内容（所有订单）</h3>
  <pre id="raw-data">暂无数据</pre>
  
  <h3>📋 订单卡片</h3>
  <div id="list">暂无订单</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const listDiv = document.getElementById('list');
    const statusDiv = document.getElementById('status');
    const rawDiv = document.getElementById('raw-data');

    function updateStatus(success, msg) {
      statusDiv.textContent = msg;
      statusDiv.className = 'status ' + (success ? 'success' : 'error');
    }

    function fetchOrders() {
      updateStatus(true, '⏳ 拉取中...');
      db.ref('orders').once('value', snapshot => {
        // 显示原始数据
        if (snapshot.exists()) {
          const raw = {};
          snapshot.forEach(child => {
            raw[child.key] = child.val();
          });
          rawDiv.textContent = JSON.stringify(raw, null, 2);
        } else {
          rawDiv.textContent = '数据库 orders 节点为空';
        }

        // 渲染卡片
        renderOrders(snapshot);
        updateStatus(true, '✅ 连接正常，共 ' + (snapshot.numChildren()) + ' 条订单');
      }).catch(err => {
        updateStatus(false, '❌ 连接失败：' + err.message);
        rawDiv.textContent = '连接失败';
      });
    }

    function renderOrders(snapshot) {
      listDiv.innerHTML = '';
      if (!snapshot.exists()) {
        listDiv.textContent = '暂无订单';
        return;
      }
      const orders = [];
      snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
      orders.sort((a, b) => b.time.localeCompare(a.time));
      
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order ' + (order.status || 'new');
        card.id = 'order-' + order.key;
        card.innerHTML = `
          <strong>${order.dish}</strong>
          ${order.note ? `<div>📝 ${order.note}</div>` : ''}
          <div style="color:#666; font-size:12px;">${order.time} (${order.status})</div>
        `;
        
        const btns = document.createElement('div');
        if (order.status === 'new') {
          btns.innerHTML = `
            <button class="accept">接单</button>
            <button class="reject">今天没有</button>
          `;
          btns.querySelector('.accept').onclick = () => db.ref('orders/' + order.key).update({ status: 'accepted' });
          btns.querySelector('.reject').onclick = () => db.ref('orders/' + order.key).update({ status: 'rejected' });
        } else if (order.status === 'accepted') {
          btns.innerHTML = `<button class="done">做好了</button>`;
          btns.querySelector('.done').onclick = () => db.ref('orders/' + order.key).update({ status: 'done' });
        } else {
          btns.innerHTML = order.status === 'done' ? '✅ 已完成' : '❌ 已拒绝';
        }
        card.appendChild(btns);
        listDiv.appendChild(card);
      });
    }

    function updateOrder(key, status) {
      db.ref('orders/' + key).update({ status });
    }

    // 首次加载 & 定时刷新
    fetchOrders();
    setInterval(fetchOrders, 2000);
  </script>
</body>
</html>
