<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>妈妈看单</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 20px auto; padding: 0 15px; }
        .order-card { background: #FFF3E0; border-left: 8px solid #FF6B35; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .done-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 20px; }
        .time { color: #888; font-size: 14px; }
        audio { display: none; }
    </style>
</head>
<body>
    <h2>📋 点菜单</h2>
    <div id="order-list"><p>等待下单中...</p></div>
    
    <audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://console.firebase.google.com/project/diancai-fecb0/database/diancai-fecb0-default-rtdb/data/~2F?hl=zh-cn" // 👈 只改这里！！！
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listDiv = document.getElementById('order-list');
        const sound = document.getElementById('sound');

        function playSound() {
            sound.play().catch(e => console.log("需要点一下页面才能播放声音"));
        }

        function renderOrder(snapshot) {
            const order = snapshot.val();
            const key = snapshot.key;
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div>
                    <strong style="font-size:20px;">${order.dish}</strong>
                    <div class="time">${order.time}</div>
                </div>
            `;
            const doneBtn = document.createElement('button');
            doneBtn.className = 'done-btn';
            doneBtn.textContent = '做好了';
            doneBtn.onclick = () => {
                database.ref('orders/' + key).remove();
                card.remove();
            };
            card.appendChild(doneBtn);
            listDiv.prepend(card);
            playSound();
        }

        database.ref('orders').on('child_added', renderOrder);

        window.onload = () => {
            database.ref('orders').once('value').then(snapshot => {
                listDiv.innerHTML = '';
                snapshot.forEach(child => renderOrder(child));
            });
        };

        document.body.addEventListener('click', function() {
            sound.play().catch(()=>{});
        }, { once: true });
    </script>
</body>
</html>
