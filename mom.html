<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>妈妈看单</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f0f4ff;
            --card-bg: rgba(255,255,255,0.85);
            --text: #1e293b;
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0eaff 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .top-actions {
            display: flex; justify-content: center; margin-bottom: 15px;
        }
        .btn {
            border: none; border-radius: 30px; padding: 10px 20px; font-size: 14px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 6px 15px rgba(37,99,235,0.25); }
        .btn-outline {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.8); color: #475569;
        }
        .order-item {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 16px;
            padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border-left: 4px solid #cbd5e1;
        }
        .order-item.status-new { border-left-color: #f59e0b; background: #fffdf5; }
        .order-item.status-accepted { border-left-color: #2563eb; background: #f5f9ff; }
        .order-item.status-rejected { border-left-color: #ef4444; background: #fff5f5; }
        .order-item.status-done { border-left-color: #10b981; background: #f5fff9; }
        .dish-name { font-weight: 700; font-size: 18px; }
        .note { color: #475569; font-size: 14px; margin: 4px 0; }
        .time { color: #94a3b8; font-size: 13px; }
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .action-btn {
            flex: 1; padding: 8px; border: none; border-radius: 20px; font-size: 14px; font-weight: 500;
            color: white; cursor: pointer; transition: all 0.15s;
        }
        .action-btn:active { transform: scale(0.95); }
        .accept-btn { background: #2563eb; }
        .reject-btn { background: #ef4444; }
        .done-btn { background: #10b981; }
        .pull-refresh { text-align: center; padding: 10px; color: #64748b; font-size: 14px; display: none; align-items: center; justify-content: center; gap: 8px; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #cbd5e1; border-top: 2px solid #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        audio { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📋 点菜单</h1></div>
    <div class="top-actions">
        <button class="btn btn-outline" id="clear-done-btn" style="width:100%; justify-content:center;">🧹 清除已完成/已拒绝（仅本机）</button>
    </div>
    <div class="pull-refresh" id="pull-refresh">
        <div class="spinner" id="refresh-spinner"></div>
        <span id="refresh-text">下拉刷新</span>
    </div>
    <div id="order-list">等待下单...</div>
    <audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const listDiv = document.getElementById('order-list');
    const sound = document.getElementById('sound');

    function playSound() { sound.play().catch(()=>{}); }
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

    function showNotification(order) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('🍽️ 新订单', { body: order.dish, tag: 'new-order' });
        }
    }
    function speakOrder(order) {
        if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance('新订单：' + order.dish);
            u.lang = 'zh-CN'; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }
    }

    function updateOrder(key, status) {
        database.ref('orders/' + key).update({ status });
    }

    // 本地隐藏管理
    function getHiddenKeys() {
        const stored = localStorage.getItem('mom_hidden_orders');
        return stored ? JSON.parse(stored) : [];
    }
    function addHiddenKey(key) {
        const hidden = getHiddenKeys();
        hidden.push(key);
        localStorage.setItem('mom_hidden_orders', JSON.stringify(hidden));
    }
    function clearHiddenKeys() {
        localStorage.removeItem('mom_hidden_orders');
    }

    function renderOrderCard(key, order) {
        const hidden = getHiddenKeys();
        if (hidden.includes(key)) return null; // 已隐藏的订单不渲染

        const card = document.createElement('div');
        card.className = 'order-item status-' + order.status;
        card.innerHTML = `
            <div style="flex:1;">
                <div class="dish-name">${order.dish}</div>
                ${order.note ? `<div class="note">📝 ${order.note}</div>` : ''}
                <div class="time">🕒 ${order.time}</div>
            </div>
        `;
        const btnGroup = document.createElement('div');
        btnGroup.className = 'btn-group';

        if (order.status === 'new') {
            const acceptBtn = document.createElement('button');
            acceptBtn.className = 'action-btn accept-btn';
            acceptBtn.textContent = '接单';
            acceptBtn.onclick = () => updateOrder(key, 'accepted');
            const rejectBtn = document.createElement('button');
            rejectBtn.className = 'action-btn reject-btn';
            rejectBtn.textContent = '今天没有';
            rejectBtn.onclick = () => updateOrder(key, 'rejected');
            btnGroup.appendChild(acceptBtn);
            btnGroup.appendChild(rejectBtn);
        } else if (order.status === 'accepted') {
            const doneBtn = document.createElement('button');
            doneBtn.className = 'action-btn done-btn';
            doneBtn.textContent = '做好了';
            doneBtn.onclick = () => updateOrder(key, 'done');
            btnGroup.appendChild(doneBtn);
        } else {
            const statusText = order.status === 'done' ? '✅ 已完成' : '❌ 已拒绝';
            const span = document.createElement('span');
            span.style.color = '#64748b'; span.style.fontSize = '14px'; span.textContent = statusText;
            btnGroup.appendChild(span);
        }
        card.appendChild(btnGroup);
        return card;
    }

    function renderAll() {
        database.ref('orders').once('value', snapshot => {
            listDiv.innerHTML = '';
            if (!snapshot.exists()) { listDiv.innerHTML = '等待下单...'; return; }
            const orders = [];
            snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
            orders.sort((a, b) => b.time.localeCompare(a.time));
            let hasVisible = false;
            orders.forEach(order => {
                const card = renderOrderCard(order.key, order);
                if (card) {
                    listDiv.appendChild(card);
                    hasVisible = true;
                }
            });
            if (!hasVisible) listDiv.innerHTML = '没有订单';
        });
    }

    // 实时更新（但保留本地隐藏）
    database.ref('orders').on('value', snapshot => {
        // 简单处理：如果订单数量变化就重新渲染
        renderAll();
        // 新订单提示
        const hidden = getHiddenKeys();
        snapshot.forEach(child => {
            if (!hidden.includes(child.key) && child.val().status === 'new') {
                playSound();
                speakOrder(child.val());
                showNotification(child.val());
            }
        });
    });

    // 清除按钮：把当前所有 done/rejected 的订单 key 加入本地隐藏列表
    document.getElementById('clear-done-btn').addEventListener('click', () => {
        database.ref('orders').once('value', snapshot => {
            const keysToHide = [];
            snapshot.forEach(child => {
                const order = child.val();
                if (order.status === 'done' || order.status === 'rejected') {
                    keysToHide.push(child.key);
                }
            });
            if (keysToHide.length === 0) { alert('没有可清除的订单'); return; }
            keysToHide.forEach(key => addHiddenKey(key));
            renderAll();
            alert('已清除本机显示（数据库未动，A端仍可见）');
        });
    });

    // 下拉刷新
    const pullRefresh = document.getElementById('pull-refresh');
    const refreshText = document.getElementById('refresh-text');
    const refreshSpinner = document.getElementById('refresh-spinner');
    let startY = 0;
    document.addEventListener('touchstart', e => { if (window.scrollY === 0) startY = e.touches[0].clientY; });
    document.addEventListener('touchmove', e => {
        if (window.scrollY === 0 && e.touches[0].clientY - startY > 50) {
            pullRefresh.style.display = 'flex'; refreshText.textContent = '释放刷新';
        }
    });
    document.addEventListener('touchend', () => {
        if (refreshText.textContent === '释放刷新') {
            refreshText.textContent = '刷新中...'; refreshSpinner.style.display = 'block';
            setTimeout(() => window.location.reload(), 400);
        }
        pullRefresh.style.display = 'none'; refreshSpinner.style.display = 'none';
    });

    document.body.addEventListener('click', () => sound.play().catch(()=>{}), { once: true });
    // 初始化渲染
    renderAll();
</script>
</body>
</html>
