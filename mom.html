<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>妈妈看单</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 20px auto; padding: 0 15px; background: #fffaf5; }
        h2 { text-align: center; color: #FF6B35; }
        .order-card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .done-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        audio { display: none; }
    </style>
</head>
<body>
    <h2>📋 点菜单</h2>
    <div id="order-list">等待下单...</div>
    <audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listDiv = document.getElementById('order-list');
        const sound = document.getElementById('sound');

        function playSound() {
            sound.play().catch(() => {});
        }

        database.ref('orders').on('value', snapshot => {
            listDiv.innerHTML = '';
            if (!snapshot.exists()) {
                listDiv.innerHTML = '等待下单...';
                return;
            }
            const orders = [];
            snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
            orders.reverse().forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `<span>${order.dish} <small>${order.time}</small></span>`;
                const doneBtn = document.createElement('button');
                doneBtn.className = 'done-btn';
                doneBtn.textContent = '好了';
                doneBtn.onclick = () => database.ref('orders/' + order.key).remove();
                card.appendChild(doneBtn);
                listDiv.appendChild(card);
            });
        });

        database.ref('orders').on('child_added', playSound);
        document.body.addEventListener('click', () => sound.play().catch(() => {}), { once: true });
    </script>
</body>
</html>
