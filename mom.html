<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>妈妈看单</title>
  <style>
    body { font-family: sans-serif; background: #eef5ff; padding: 20px; }
    .order { background: white; border-radius: 12px; padding: 14px; margin: 10px 0; border-left: 4px solid #f59e0b; }
    .order.accepted { border-left-color: #2563eb; }
    .order.done { border-left-color: #10b981; }
    .order.rejected { border-left-color: #ef4444; }
    button { margin-right: 6px; padding: 6px 12px; border-radius: 14px; border: none; color: white; }
    .accept { background: #2563eb; }
    .reject { background: #ef4444; }
    .done { background: #10b981; }
  </style>
</head>
<body>
  <h2>📋 妈妈看单</h2>
  <div id="list">连接中...</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const list = document.getElementById('list');

    console.log('Firebase 初始化完成');

    // 先加载历史订单（防止 child_added 漏掉）
    db.ref('orders').once('value', snapshot => {
      console.log('历史订单数量:', snapshot.numChildren());
      list.innerHTML = '';
      if (!snapshot.exists()) {
        list.textContent = '暂无订单';
        return;
      }
      const orders = [];
      snapshot.forEach(c => orders.push({ key: c.key, ...c.val() }));
      orders.sort((a, b) => b.time.localeCompare(a.time));
      orders.forEach(o => addOrder(o.key, o));
    });

    // 监听新订单
    db.ref('orders').on('child_added', snapshot => {
      console.log('收到新订单:', snapshot.key, snapshot.val());
      addOrder(snapshot.key, snapshot.val());
    });

    // 监听状态变化
    db.ref('orders').on('child_changed', snapshot => {
      const old = document.getElementById('order-' + snapshot.key);
      if (old) old.remove();
      addOrder(snapshot.key, snapshot.val());
    });

    function addOrder(key, order) {
      // 避免重复添加
      if (document.getElementById('order-' + key)) return;
      
      const div = document.createElement('div');
      div.className = `order ${order.status}`;
      div.id = 'order-' + key;
      div.innerHTML = `
        <strong>${order.dish}</strong>
        ${order.note ? `<div>📝 ${order.note}</div>` : ''}
        <div style="color:#666; font-size:12px;">${order.time}</div>
      `;

      const btns = document.createElement('div');
      if (order.status === 'new') {
        btns.innerHTML = `
          <button class="accept">接单</button>
          <button class="reject">今天没有</button>
        `;
        btns.querySelector('.accept').onclick = () => db.ref('orders/' + key).update({ status: 'accepted' });
        btns.querySelector('.reject').onclick = () => db.ref('orders/' + key).update({ status: 'rejected' });
      } else if (order.status === 'accepted') {
        btns.innerHTML = `<button class="done">做好了</button>`;
        btns.querySelector('.done').onclick = () => db.ref('orders/' + key).update({ status: 'done' });
      } else {
        btns.innerHTML = order.status === 'done' ? '✅ 已完成' : '❌ 已拒绝';
      }
      div.appendChild(btns);
      list.prepend(div);
    }
  </script>
</body>
</html>
