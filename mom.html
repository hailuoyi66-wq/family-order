<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>妈妈看单</title>
    <style>
        :root { --primary: #2563eb; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0eaff 100%);
            min-height: 100vh; padding: 20px 16px; color: #1e293b;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .header h1 {
            font-size: 28px; font-weight: 700; text-align: center;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .top-btn {
            width: 100%; padding: 12px; border-radius: 14px; border: none;
            background: rgba(255,255,255,0.7); font-size: 15px; font-weight: 600;
            margin: 8px 0; cursor: pointer;
        }
        .order-card {
            background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px;
            border-left: 4px solid #cbd5e1; display: flex; justify-content: space-between;
            transition: border-color 0.2s, background 0.2s;
        }
        .order-card.status-new { border-left-color: #f59e0b; background: #fffdf5; }
        .order-card.status-accepted { border-left-color: #2563eb; background: #f5f9ff; }
        .order-card.status-rejected { border-left-color: #ef4444; background: #fff5f5; }
        .order-card.status-done { border-left-color: #10b981; background: #f5fff9; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn {
            flex:1; padding: 8px; border: none; border-radius: 20px; color: white; font-weight: 500;
        }
        .accept { background: #2563eb; } .reject { background: #ef4444; } .done { background: #10b981; }
        audio { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📋 点菜单</h1></div>
    <button class="top-btn" id="clear-local">🧹 隐藏已完成/已拒绝（仅本机）</button>
    <div id="order-list">暂无订单</div>
    <audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
    firebase.initializeApp({ databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/" });
    const db = firebase.database();
    const listDiv = document.getElementById('order-list');
    const sound = document.getElementById('sound');

    function playSound() { sound.play().catch(() => {}); }
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

    // 本地隐藏管理
    function getHidden() {
        return JSON.parse(localStorage.getItem('b_hidden_orders') || '[]');
    }
    function addHidden(keys) {
        const h = getHidden();
        keys.forEach(k => { if (!h.includes(k)) h.push(k); });
        localStorage.setItem('b_hidden_orders', JSON.stringify(h));
    }

    // 更新订单状态（数据库写入，界面由 child_changed 自动更新）
    function updateOrder(key, status) {
        db.ref('orders/' + key).update({ status });
    }

    // 判断是否隐藏
    function isHidden(key) {
        return getHidden().includes(key);
    }

    // 根据订单数据更新卡片的样式和按钮（原地更新，不替换整个卡片）
    function updateCardUI(card, order) {
        // 更新状态类名
        card.className = `order-card status-${order.status}`;
        // 更新按钮区域
        const btnGroup = card.querySelector('.btn-group');
        if (!btnGroup) return;
        btnGroup.innerHTML = '';
        if (order.status === 'new') {
            btnGroup.innerHTML = `<button class="action-btn accept">接单</button><button class="action-btn reject">今天没有</button>`;
            btnGroup.querySelector('.accept').onclick = () => updateOrder(order.key, 'accepted');
            btnGroup.querySelector('.reject').onclick = () => updateOrder(order.key, 'rejected');
        } else if (order.status === 'accepted') {
            btnGroup.innerHTML = `<button class="action-btn done">做好了</button>`;
            btnGroup.querySelector('.done').onclick = () => updateOrder(order.key, 'done');
        } else {
            btnGroup.innerHTML = `<span style="color:#64748b">${order.status === 'done' ? '✅已完成' : '❌已拒绝'}</span>`;
        }
    }

    // 创建新订单卡片
    function createCard(key, order) {
        const card = document.createElement('div');
        card.className = `order-card status-${order.status}`;
        card.id = 'order-' + key;
        card.innerHTML = `
            <div style="flex:1">
                <div style="font-weight:bold; font-size:18px">${order.dish}</div>
                ${order.note ? `<div>📝 ${order.note}</div>` : ''}
                <div style="color:#94a3b8; font-size:13px">${order.time}</div>
            </div>
            <div class="btn-group"></div>
        `;
        updateCardUI(card, { ...order, key }); // 初始化按钮
        return card;
    }

    // 首次加载历史订单（按时间倒序）
    function loadInitialOrders() {
        db.ref('orders').once('value', snapshot => {
            listDiv.innerHTML = '';
            if (!snapshot.exists()) {
                listDiv.textContent = '暂无订单';
                return;
            }
            const orders = [];
            snapshot.forEach(child => {
                if (!isHidden(child.key)) {
                    orders.push({ key: child.key, ...child.val() });
                }
            });
            orders.sort((a, b) => b.time.localeCompare(a.time));
            orders.forEach(order => {
                listDiv.appendChild(createCard(order.key, order));
            });
        });
    }

    // 初始化加载
    loadInitialOrders();

    // 实时监听新订单（prepend 到顶部）
    db.ref('orders').on('child_added', snapshot => {
        const key = snapshot.key;
        // 如果卡片已存在（可能是初始加载的）则跳过
        if (document.getElementById('order-' + key)) return;
        // 如果被隐藏则跳过
        if (isHidden(key)) return;

        const order = snapshot.val();
        const card = createCard(key, order);
        listDiv.prepend(card); // 新订单永远在顶部

        // 提示
        if (order.status === 'new') {
            playSound();
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance('新订单：' + order.dish);
                u.lang = 'zh-CN'; window.speechSynthesis.speak(u);
            }
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('🍽️ 新订单', { body: order.dish });
            }
        }
    });

    // 监听状态变化：原地更新卡片
    db.ref('orders').on('child_changed', snapshot => {
        const key = snapshot.key;
        const card = document.getElementById('order-' + key);
        if (!card) return;
        const order = snapshot.val();
        // 如果被隐藏则移除卡片
        if (isHidden(key)) {
            card.remove();
            return;
        }
        // 原地更新样式和按钮
        updateCardUI(card, { ...order, key });
    });

    // 监听删除
    db.ref('orders').on('child_removed', snapshot => {
        const card = document.getElementById('order-' + snapshot.key);
        if (card) card.remove();
    });

    // 清除按钮：隐藏已完成/已拒绝
    document.getElementById('clear-local').onclick = () => {
        db.ref('orders').once('value', snapshot => {
            const toHide = [];
            snapshot.forEach(c => {
                const o = c.val();
                if (o.status === 'done' || o.status === 'rejected') toHide.push(c.key);
            });
            if (!toHide.length) return alert('没有可隐藏的订单');
            addHidden(toHide);
            // 移除对应卡片
            toHide.forEach(key => {
                const card = document.getElementById('order-' + key);
                if (card) card.remove();
            });
            alert('已隐藏');
        });
    };

    // 激活音频上下文
    document.body.addEventListener('click', () => sound.play().catch(() => {}), { once: true });
</script>
</body>
</html>
