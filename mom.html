<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>妈妈看单</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 20px auto; padding: 0 15px; background: #fffaf5; }
        h2 { text-align: center; color: #FF6B35; }
        .order-card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 6px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; color: white; }
        .accept-btn { background: #2196F3; }
        .reject-btn { background: #f44336; }
        .done-btn { background: #4CAF50; }
        .time { color: #999; font-size: 14px; }
        .note { color: #555; font-size: 14px; margin: 5px 0; }
        audio { display: none; }
        .pull-refresh { text-align: center; padding: 8px; color: #999; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <h2>📋 点菜单</h2>
    <div class="pull-refresh" id="pull-refresh">下拉刷新</div>
    <div id="order-list">等待下单...</div>
    <audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listDiv = document.getElementById('order-list');
        const sound = document.getElementById('sound');

        function playSound() { sound.play().catch(()=>{}); }

        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        requestNotificationPermission();

        function showNotification(order) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('🍽️ 新订单', {
                    body: order.dish,
                    icon: 'https://cdn-icons-png.flaticon.com/128/1046/1046784.png',
                    tag: 'new-order'
                });
            }
        }

        function speakOrder(order) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('新订单：' + order.dish);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateOrder(key, status) {
            database.ref('orders/' + key).update({ status: status });
        }

        // 核心：每条订单单独显示，不合并
        function renderAllOrders(snapshot) {
            listDiv.innerHTML = '';
            if (!snapshot.exists()) {
                listDiv.innerHTML = '等待下单...';
                return;
            }
            const orders = [];
            snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
            // 按时间倒序
            orders.sort((a, b) => b.time.localeCompare(a.time));
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.id = 'order-' + order.key;
                
                card.innerHTML = `
                    <div style="font-weight:bold;font-size:18px;">${order.dish}</div>
                    ${order.note ? `<div class="note">📝 ${order.note}</div>` : ''}
                    <div class="time">🕒 ${order.time}</div>
                `;
                
                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';
                
                if (order.status === 'new') {
                    const acceptBtn = document.createElement('button');
                    acceptBtn.className = 'action-btn accept-btn';
                    acceptBtn.textContent = '接单';
                    acceptBtn.onclick = () => updateOrder(order.key, 'accepted');
                    
                    const rejectBtn = document.createElement('button');
                    rejectBtn.className = 'action-btn reject-btn';
                    rejectBtn.textContent = '今天没有';
                    rejectBtn.onclick = () => updateOrder(order.key, 'rejected');
                    
                    btnGroup.appendChild(acceptBtn);
                    btnGroup.appendChild(rejectBtn);
                } else if (order.status === 'accepted') {
                    const doneBtn = document.createElement('button');
                    doneBtn.className = 'action-btn done-btn';
                    doneBtn.textContent = '做好了';
                    doneBtn.onclick = () => updateOrder(order.key, 'done');
                    btnGroup.appendChild(doneBtn);
                } else {
                    const statusText = order.status === 'done' ? '✅ 已完成' : '❌ 已拒绝';
                    card.innerHTML += `<div style="margin-top:8px;color:#888;">${statusText}</div>`;
                }
                
                card.appendChild(btnGroup);
                listDiv.appendChild(card);
            });
        }

        // 监听数据变化，重新渲染整个列表
        database.ref('orders').on('value', snapshot => {
            renderAllOrders(snapshot);
        });

        // 新订单提示
        let lastOrderCount = 0;
        database.ref('orders').on('value', snapshot => {
            const count = snapshot.numChildren();
            if (count > lastOrderCount) {
                playSound();
                // 获取最新订单并播报
                const orders = [];
                snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
                if (orders.length > 0) {
                    const latest = orders[orders.length - 1];
                    speakOrder(latest);
                    showNotification(latest);
                }
            }
            lastOrderCount = count;
        });

        // 下拉刷新
        const pullRefresh = document.getElementById('pull-refresh');
        let startY = 0;
        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) startY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0) {
                if (e.touches[0].clientY - startY > 50) {
                    pullRefresh.style.display = 'block';
                    pullRefresh.textContent = '释放刷新';
                } else {
                    pullRefresh.style.display = 'none';
                }
            }
        });
        document.addEventListener('touchend', e => {
            if (pullRefresh.textContent === '释放刷新') {
                pullRefresh.textContent = '刷新中...';
                setTimeout(() => window.location.reload(), 300);
            }
            pullRefresh.style.display = 'none';
        });

        document.body.addEventListener('click', () => sound.play().catch(()=>{}), { once: true });
    </script>
</body>
</html>
