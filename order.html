<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f0f4ff;
            --card-bg: rgba(255,255,255,0.85);
            --text: #1e293b;
            --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0eaff 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .category-title {
            font-size: 20px; font-weight: 700; color: #1e40af; margin: 20px 0 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid rgba(255,255,255,0.7);
        }
        .menu-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .menu-name { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .emoji-icon { font-size: 24px; }
        .qty-control { display: flex; align-items: center; gap: 6px; }
        .qty-btn {
            background: #f1f5f9; border: none; width: 34px; height: 34px; border-radius: 50%;
            font-size: 18px; display: flex; align-items: center; justify-content: center; color: #334155; cursor: pointer;
        }
        .qty-btn:active { transform: scale(0.9); background: #cbd5e1; }
        .qty-num { font-size: 16px; min-width: 28px; text-align: center; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 8px; background: #f8fafc; }
        .note-input {
            width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 12px;
            font-size: 14px; background: rgba(255,255,255,0.6); margin-top: 5px;
        }
        .note-input:focus { outline: none; border-color: var(--primary); }
        .custom-header { font-weight: 600; margin-bottom: 12px; color: #1e40af; font-size: 16px; }
        .custom-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .custom-row input[type="text"] {
            flex: 2; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px;
        }
        .btn {
            border: none; border-radius: 30px; padding: 10px 18px; font-size: 14px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 6px 15px rgba(37,99,235,0.25); }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-submit {
            width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white;
            border: none; border-radius: 30px; cursor: pointer; margin: 20px 0 24px;
            box-shadow: 0 12px 30px rgba(37,99,235,0.35);
        }
        .btn-submit:active { transform: scale(0.97); }
        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(30,41,59,0.85); backdrop-filter: blur(10px); color: white;
            padding: 12px 28px; border-radius: 30px; font-size: 14px; display: none; z-index: 9999;
        }
        .order-section { margin-top: 24px; }
        .order-item {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 16px;
            padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border-left: 4px solid #cbd5e1;
        }
        .order-item.status-new { border-left-color: #f59e0b; background: #fffdf5; }
        .order-item.status-accepted { border-left-color: #2563eb; background: #f5f9ff; }
        .order-item.status-rejected { border-left-color: #ef4444; background: #fff5f5; }
        .order-item.status-done { border-left-color: #10b981; background: #f5fff9; }
        .order-detail { flex: 1; }
        .status-badge {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            color: white; margin-left: 10px; white-space: nowrap;
        }
        .status-new .status-badge { background: #f59e0b; }
        .status-accepted .status-badge { background: #2563eb; }
        .status-rejected .status-badge { background: #ef4444; }
        .status-done .status-badge { background: #10b981; }
        .toggle-btn, .archive-btn {
            background: rgba(255,255,255,0.5); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.8); padding: 12px; width: 100%;
            border-radius: 14px; margin-top: 12px; font-size: 15px; cursor: pointer; color: #475569;
            display: flex; align-items: center; gap: 6px;
        }
        .delete-custom-btn {
            background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 2px 6px;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: white; border-radius: 24px; padding: 24px; width: 85%; max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            transform: translateY(20px); transition: transform 0.3s;
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal h3 { font-size: 20px; margin-bottom: 16px; color: #1e40af; }
        .modal-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions .btn { flex: 1; }
        .pull-refresh { text-align: center; padding: 10px; color: #64748b; font-size: 14px; display: none; align-items: center; justify-content: center; gap: 8px; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #cbd5e1; border-top: 2px solid #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🛒 今天想吃什么？</h1></div>
    <div class="pull-refresh" id="pull-refresh">
        <div class="spinner" id="refresh-spinner"></div>
        <span id="refresh-text">下拉刷新</span>
    </div>

    <!-- 动态菜品区（按分类渲染） -->
    <div id="menu-container"></div>

    <!-- 自定义菜品区（永久保存） -->
    <div class="card">
        <div class="custom-header">✏️ 添加自定义菜品到菜单</div>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="new-custom-name" placeholder="菜名" style="flex:1.5;">
            <select id="new-custom-category" style="flex:1; padding:10px; border-radius:12px; border:1px solid #e2e8f0;">
                <option value="meat">🥩 荤菜</option>
                <option value="veggie">🥬 素菜</option>
                <option value="soup">🍲 汤羹/其他</option>
            </select>
            <button class="btn btn-primary" id="add-custom-btn">➕ 添加</button>
        </div>
        <div id="custom-list"></div>
    </div>

    <button class="btn-submit" id="submit-all">🚀 一键下单</button>

    <div class="order-section">
        <h3 style="font-size:18px; color:#1e40af; margin-bottom:10px;">📋 我的订单</h3>
        <div id="order-list">暂无订单</div>
        <button class="toggle-btn" id="toggle-filter">📜 只显示进行中</button>
        <button class="archive-btn" id="archive-done">🗃️ 归档已完成/已拒绝（A端）</button>
    </div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal">
        <h3>确认下单</h3>
        <div id="modal-content"></div>
        <div class="modal-actions">
            <button class="btn" style="background:#f1f5f9; color:#475569;" id="modal-cancel">取消</button>
            <button class="btn btn-primary" id="modal-confirm">确认下单</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const SENDKEY = "SCT374453T20ILwoLTxUBmaj7kw17ItcBZ";

    // ========== 菜品分类数据 ==========
    const menuCategories = {
        meat: { title: "🥩 荤菜", items: [
            { name: "红烧排骨", emoji: "🍖" },
            { name: "可乐鸡翅", emoji: "🍗" },
            { name: "红烧猪脚", emoji: "🐷" },
            { name: "鱼香肉丝", emoji: "🐟" },
            { name: "宫保鸡丁", emoji: "🥜" },
            { name: "回锅肉", emoji: "🥓" },
            { name: "青椒肉丝", emoji: "🫑" }
        ]},
        veggie: { title: "🥬 素菜", items: [
            { name: "番茄炒蛋", emoji: "🍅" },
            { name: "酸辣土豆丝", emoji: "🥔" },
            { name: "玉米炒火腿", emoji: "🌽" },
            { name: "地三鲜", emoji: "🍆" },
            { name: "麻婆豆腐", emoji: "🧈" },
            { name: "蒜蓉西兰花", emoji: "🥦" },
            { name: "干煸豆角", emoji: "🫘" }
        ]},
        soup: { title: "🍲 汤羹/其他", items: [
            { name: "紫菜蛋花汤", emoji: "🍲" }
        ]}
    };

    // 所有菜品（含自定义）的本地数据 { name: { qty, note } }
    const menuData = {};
    // 初始化默认菜单的数据
    for (let cat in menuCategories) {
        menuCategories[cat].items.forEach(dish => {
            menuData[dish.name] = { qty: 0, note: '' };
        });
    }

    // ========== 工具函数 ==========
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg || '';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function sendWechatMsg(summaryLines) {
        if (!SENDKEY || SENDKEY === "SCTxxxxxxxxxxxxx") return;
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://sctapi.ftqq.com/' + SENDKEY + '.send', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        const desp = '**新订单**\n\n' + summaryLines.join('\n') + '\n\n时间：' + now;
        xhr.send('title=' + encodeURIComponent('🍽️ 新订单') + '&desp=' + encodeURIComponent(desp));
    }

    function pushOrder(dish, note) {
        return database.ref('orders').push({
            dish: dish,
            time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
            status: 'new',
            note: note || ''
        });
    }

    // ========== 渲染菜单（按分类） ==========
    const menuContainer = document.getElementById('menu-container');
    function renderAllMenu() {
        menuContainer.innerHTML = '';
        for (let cat in menuCategories) {
            const category = menuCategories[cat];
            // 分类标题
            const titleDiv = document.createElement('div');
            titleDiv.className = 'category-title';
            titleDiv.textContent = category.title;
            menuContainer.appendChild(titleDiv);

            category.items.forEach(dish => {
                const card = createDishCard(dish);
                menuContainer.appendChild(card);
            });
        }
    }

    function createDishCard(dish) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="menu-row">
                <span class="menu-name"><span class="emoji-icon">${dish.emoji || '🍽️'}</span>${dish.name}</span>
                <div class="qty-control">
                    <button class="qty-btn minus-btn">−</button>
                    <span class="qty-num" data-dish="${dish.name}">0</span>
                    <button class="qty-btn plus-btn">+</button>
                </div>
            </div>
            <input type="text" class="note-input" placeholder="备注" data-dish="${dish.name}">
        `;
        const minusBtn = card.querySelector('.minus-btn');
        const plusBtn = card.querySelector('.plus-btn');
        const numSpan = card.querySelector('.qty-num');
        const noteInput = card.querySelector('.note-input');

        minusBtn.onclick = () => {
            if (menuData[dish.name] && menuData[dish.name].qty > 0) {
                menuData[dish.name].qty--;
                numSpan.textContent = menuData[dish.name].qty;
            }
        };
        plusBtn.onclick = () => {
            if (!menuData[dish.name]) menuData[dish.name] = { qty: 0, note: '' };
            menuData[dish.name].qty++;
            numSpan.textContent = menuData[dish.name].qty;
        };
        numSpan.addEventListener('click', (e) => {
            e.stopPropagation();
            const cur = menuData[dish.name] ? menuData[dish.name].qty : 0;
            const newQty = prompt(`输入 ${dish.name} 的数量`, cur);
            if (newQty !== null) {
                const num = parseInt(newQty);
                if (!isNaN(num) && num >= 0) {
                    if (!menuData[dish.name]) menuData[dish.name] = { qty: 0, note: '' };
                    menuData[dish.name].qty = num;
                    numSpan.textContent = num;
                }
            }
        });
        noteInput.oninput = (e) => {
            if (!menuData[dish.name]) menuData[dish.name] = { qty: 0, note: '' };
            menuData[dish.name].note = e.target.value.trim();
        };
        return card;
    }

    // ========== 自定义菜品（永久存储到 custom_menu） ==========
    function loadCustomMenu() {
        database.ref('custom_menu').once('value', snapshot => {
            const customItems = snapshot.val() || [];
            // 清空原有自定义项，重新装入对应分类
            for (let cat in menuCategories) {
                menuCategories[cat].items = menuCategories[cat].items.filter(d => !d.isCustom);
            }
            customItems.forEach(item => {
                const cat = item.category || 'meat';
                if (menuCategories[cat]) {
                    menuCategories[cat].items.push({
                        name: item.name,
                        emoji: item.emoji || '🍽️',
                        isCustom: true,
                        id: item.id
                    });
                    // 初始化 menuData
                    if (!menuData[item.name]) menuData[item.name] = { qty: 0, note: '' };
                }
            });
            renderAllMenu();
        });
    }

    function addCustomDish(name, category, emoji = '🍽️') {
        const newRef = database.ref('custom_menu').push();
        const newItem = { id: newRef.key, name, category, emoji };
        newRef.set(newItem).then(() => {
            loadCustomMenu();
            showToast('菜品已加入菜单');
        });
    }

    function deleteCustomDish(id) {
        if (!confirm('确定要从菜单中删除这道菜吗？')) return;
        database.ref('custom_menu/' + id).remove().then(() => {
            loadCustomMenu();
            showToast('已删除');
        });
    }

    document.getElementById('add-custom-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('new-custom-name');
        const name = nameInput.value.trim();
        if (!name) { showToast('请输入菜名'); return; }
        const category = document.getElementById('new-custom-category').value;
        addCustomDish(name, category);
        nameInput.value = '';
    });

    // ========== 下单逻辑 ==========
    function collectSelectedItems() {
        const items = [];
        for (let cat in menuCategories) {
            menuCategories[cat].items.forEach(dish => {
                const data = menuData[dish.name];
                if (data && data.qty > 0) {
                    items.push({ name: dish.name, qty: data.qty, note: data.note });
                }
            });
        }
        return items;
    }

    function showConfirmModal(items) {
        const contentDiv = document.getElementById('modal-content');
        contentDiv.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'modal-item';
            div.innerHTML = `<span><strong>${item.name}</strong> ×${item.qty}</span><span style="color:#64748b;font-size:14px;">${item.note || ''}</span>`;
            contentDiv.appendChild(div);
        });
        document.getElementById('confirm-modal').classList.add('active');
    }

    function executeOrder(items) {
        const promises = [];
        const summary = [];
        items.forEach(item => {
            summary.push(item.name + ' ×' + item.qty + (item.note ? ' (备注: ' + item.note + ')' : ''));
            for (let i = 0; i < item.qty; i++) {
                promises.push(pushOrder(item.name, item.note));
            }
        });
        return Promise.all(promises).then(() => {
            showToast('已下单，微信已提醒妈妈');
            sendWechatMsg(summary);
            // 重置本地数据
            for (let key in menuData) {
                menuData[key].qty = 0;
                menuData[key].note = '';
            }
            document.querySelectorAll('.qty-num').forEach(sp => sp.textContent = '0');
            document.querySelectorAll('.note-input').forEach(inp => inp.value = '');
            // 强制刷新订单列表
            database.ref('orders').once('value', snapshot => renderOrderList(snapshot));
        });
    }

    document.getElementById('submit-all').addEventListener('click', () => {
        const items = collectSelectedItems();
        if (items.length === 0) { showToast('请至少选一道菜！'); return; }
        showConfirmModal(items);
    });

    document.getElementById('modal-cancel').addEventListener('click', () => {
        document.getElementById('confirm-modal').classList.remove('active');
    });
    document.getElementById('modal-confirm').addEventListener('click', () => {
        document.getElementById('confirm-modal').classList.remove('active');
        executeOrder(collectSelectedItems()).catch(err => showToast('下单失败: ' + err.message));
    });
    document.getElementById('confirm-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
    });

    // ========== 下拉刷新 ==========
    const pullRefresh = document.getElementById('pull-refresh');
    const refreshText = document.getElementById('refresh-text');
    const refreshSpinner = document.getElementById('refresh-spinner');
    let startY = 0;
    document.addEventListener('touchstart', e => { if (window.scrollY === 0) startY = e.touches[0].clientY; });
    document.addEventListener('touchmove', e => {
        if (window.scrollY === 0 && e.touches[0].clientY - startY > 50) {
            pullRefresh.style.display = 'flex'; refreshText.textContent = '释放刷新';
        }
    });
    document.addEventListener('touchend', () => {
        if (refreshText.textContent === '释放刷新') {
            refreshText.textContent = '刷新中...'; refreshSpinner.style.display = 'block';
            setTimeout(() => window.location.reload(), 400);
        }
        pullRefresh.style.display = 'none'; refreshSpinner.style.display = 'none';
    });

    // ========== 订单渲染 ==========
    const orderListDiv = document.getElementById('order-list');
    let showOnlyActive = false;

    function renderOrderList(snapshot) {
        orderListDiv.innerHTML = '';
        if (!snapshot.exists()) {
            orderListDiv.textContent = '暂无订单';
            return;
        }
        const orders = [];
        snapshot.forEach(child => orders.push({ id: child.key, ...child.val() }));
        orders.sort((a, b) => b.time.localeCompare(a.time));
        let hasAny = false;
        orders.forEach(order => {
            if (showOnlyActive && (order.status === 'done' || order.status === 'rejected')) return;
            const div = document.createElement('div');
            div.className = 'order-item status-' + order.status;
            const statusMap = { new: '⏳ 等待接单', accepted: '👩‍🍳 已接单', rejected: '❌ 没有', done: '✅ 已做好' };
            div.innerHTML = `
                <div class="order-detail">
                    <strong>${order.dish}</strong>
                    ${order.note ? `<div style="color:#64748b; font-size:13px;">📝 ${order.note}</div>` : ''}
                    <div style="color:#94a3b8; font-size:12px;">${order.time}</div>
                </div>
                <span class="status-badge">${statusMap[order.status]}</span>
            `;
            orderListDiv.appendChild(div);
            hasAny = true;
        });
        if (!hasAny) orderListDiv.textContent = '暂无符合条件的订单';
    }

    database.ref('orders').on('value', snapshot => renderOrderList(snapshot));

    document.getElementById('toggle-filter').addEventListener('click', function() {
        showOnlyActive = !showOnlyActive;
        this.textContent = showOnlyActive ? '📋 显示全部订单' : '📜 只显示进行中';
        database.ref('orders').once('value', snapshot => renderOrderList(snapshot));
    });

    // A端归档（移动数据，B端独立不受影响）
    document.getElementById('archive-done').addEventListener('click', () => {
        const archiveRef = database.ref('archived_orders');
        database.ref('orders').once('value', snapshot => {
            const updates = {}, deletions = {};
            snapshot.forEach(child => {
                const order = child.val();
                if (order.status === 'done' || order.status === 'rejected') {
                    updates['archived_orders/' + archiveRef.push().key] = order;
                    deletions['orders/' + child.key] = null;
                }
            });
            if (Object.keys(updates).length === 0) { showToast('没有可归档的订单'); return; }
            database.ref().update({...updates, ...deletions}).then(() => showToast('归档成功！'));
        });
    });

    // 页面初始化
    loadCustomMenu();
</script>
</body>
</html>
