<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 20px auto; padding: 0 15px; background: #fffaf5; }
        h2 { text-align: center; color: #FF6B35; }
        .menu-item { background: white; padding: 15px; margin: 12px 0; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #eee; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; color: #333; }
        .qty-btn:active { background: #ddd; }
        .qty-num { font-size: 16px; min-width: 24px; text-align: center; }
        .custom-area { background: white; padding: 15px; margin: 15px 0; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .custom-area input { padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: calc(100% - 80px); box-sizing: border-box; }
        .submit-btn { background: #FF6B35; color: white; border: none; padding: 14px; border-radius: 25px; font-size: 18px; cursor: pointer; width: 100%; margin: 10px 0 20px; }
        .submit-btn:active { background: #e55a2b; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 999; }
        .my-order { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; }
        .order-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; }
        .status-new { background: #ff9800; }
        .status-accepted { background: #2196F3; }
        .status-rejected { background: #f44336; }
        .status-done { background: #4CAF50; }
        .pull-refresh { text-align: center; padding: 8px; color: #999; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <h2>🛒 想吃什么？</h2>
    <div class="pull-refresh" id="pull-refresh">下拉刷新</div>
    <div id="menu-container"></div>

    <!-- 自定义菜 -->
    <div class="custom-area">
        <div style="margin-bottom:8px;font-weight:bold;">✏️ 自定义想吃的菜</div>
        <div style="display:flex;align-items:center;gap:8px;">
            <input type="text" id="custom-dish" placeholder="输入菜名，如：水煮鱼" style="flex:1;">
            <div class="qty-control">
                <button class="qty-btn" id="custom-minus">−</button>
                <span class="qty-num" id="custom-qty">0</span>
                <button class="qty-btn" id="custom-plus">+</button>
            </div>
        </div>
    </div>

    <!-- 整单备注 -->
    <div class="custom-area">
        <div style="margin-bottom:8px;font-weight:bold;">📝 整单备注（可选）</div>
        <input type="text" id="global-note" placeholder="如：少油、不要味精" style="width:100%;">
    </div>

    <!-- 一键下单 -->
    <button class="submit-btn" id="submit-all">🚀 一键下单</button>

    <div class="my-order">
        <h3>📋 我的订单</h3>
        <div id="my-orders">加载中...</div>
    </div>

    <div id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const SENDKEY = "SCT374453T20ILwoLTxUBmaj7kw17ItcBZ";

        const menu = [
            "红烧排骨", "番茄炒蛋", "酸辣土豆丝", "可乐鸡翅", "玉米炒火腿",
            "紫菜蛋花汤", "红烧猪脚", "鱼香肉丝", "宫保鸡丁", "回锅肉",
            "地三鲜", "麻婆豆腐", "青椒肉丝", "蒜蓉西兰花", "干煸豆角"
        ];

        // 存储每道菜的数量（用对象）
        const quantityMap = {};
        menu.forEach(dish => { quantityMap[dish] = 0; });
        let customQuantity = 0;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function sendWechatMsg(dishListStr) {
            if (!SENDKEY || SENDKEY === "SCTxxxxxxxxxxxxx") return;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://sctapi.ftqq.com/' + SENDKEY + '.send', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            var now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            var desp = '**新订单**\n\n' + dishListStr + '\n时间：' + now;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (result.code !== 0) console.log('微信推送失败：', result);
                    } catch (e) {}
                }
            };
            var data = 'title=' + encodeURIComponent('🍽️ 新订单') + '&desp=' + encodeURIComponent(desp);
            xhr.send(data);
        }

        // 单条下单函数（内部用）
        function pushOrder(dish, note) {
            return database.ref('orders').push({
                dish: dish,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new',
                note: note || ''
            });
        }

        // 一键下单
        document.getElementById('submit-all').addEventListener('click', function() {
            const note = document.getElementById('global-note').value.trim();
            const promises = [];
            const orderedItems = [];

            // 收集已选菜品
            for (let dish of menu) {
                let qty = quantityMap[dish] || 0;
                if (qty > 0) {
                    orderedItems.push(dish + ' ×' + qty);
                    for (let i = 0; i < qty; i++) {
                        promises.push(pushOrder(dish, note));
                    }
                }
            }
            // 自定义菜
            const customDish = document.getElementById('custom-dish').value.trim();
            if (customDish && customQuantity > 0) {
                orderedItems.push(customDish + ' ×' + customQuantity);
                for (let i = 0; i < customQuantity; i++) {
                    promises.push(pushOrder(customDish, note));
                }
            }

            if (promises.length === 0) {
                showToast('请至少选一道菜！');
                return;
            }

            Promise.all(promises).then(() => {
                showToast('已下单，微信已提醒妈妈！');
                // 发送微信汇总
                var dishListStr = orderedItems.join('\n');
                if (note) dishListStr += '\n备注：' + note;
                sendWechatMsg(dishListStr);
                // 重置所有数量
                menu.forEach(d => { quantityMap[d] = 0; });
                customQuantity = 0;
                document.getElementById('custom-qty').textContent = '0';
                document.getElementById('custom-dish').value = '';
                document.getElementById('global-note').value = '';
                updateAllQtyDisplay();
            }).catch(err => {
                showToast('下单失败：' + err.message);
            });
        });

        // 渲染菜单（带加减控件）
        const container = document.getElementById('menu-container');
        menu.forEach(dish => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span style="font-size:18px;">${dish}</span>`;

            const qtyDiv = document.createElement('div');
            qtyDiv.className = 'qty-control';
            const minus = document.createElement('button');
            minus.className = 'qty-btn';
            minus.textContent = '−';
            const numSpan = document.createElement('span');
            numSpan.className = 'qty-num';
            numSpan.id = 'qty-' + dish;
            numSpan.textContent = '0';
            const plus = document.createElement('button');
            plus.className = 'qty-btn';
            plus.textContent = '+';

            minus.onclick = function() {
                if (quantityMap[dish] > 0) {
                    quantityMap[dish]--;
                    numSpan.textContent = quantityMap[dish];
                }
            };
            plus.onclick = function() {
                quantityMap[dish]++;
                numSpan.textContent = quantityMap[dish];
            };

            qtyDiv.appendChild(minus);
            qtyDiv.appendChild(numSpan);
            qtyDiv.appendChild(plus);
            div.appendChild(qtyDiv);
            container.appendChild(div);
        });

        // 自定义菜数量控制
        document.getElementById('custom-plus').onclick = function() {
            customQuantity++;
            document.getElementById('custom-qty').textContent = customQuantity;
        };
        document.getElementById('custom-minus').onclick = function() {
            if (customQuantity > 0) {
                customQuantity--;
                document.getElementById('custom-qty').textContent = customQuantity;
            }
        };

        function updateAllQtyDisplay() {
            menu.forEach(dish => {
                const span = document.getElementById('qty-' + dish);
                if (span) span.textContent = quantityMap[dish] || 0;
            });
            document.getElementById('custom-qty').textContent = customQuantity;
        }

        // 下拉刷新
        const pullRefresh = document.getElementById('pull-refresh');
        let startY = 0;
        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) startY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0) {
                if (e.touches[0].clientY - startY > 50) {
                    pullRefresh.style.display = 'block';
                    pullRefresh.textContent = '释放刷新';
                } else {
                    pullRefresh.style.display = 'none';
                }
            }
        });
        document.addEventListener('touchend', e => {
            if (pullRefresh.textContent === '释放刷新') {
                pullRefresh.textContent = '刷新中...';
                setTimeout(() => window.location.reload(), 300);
            }
            pullRefresh.style.display = 'none';
        });

        // 订单实时监听
        const myOrdersDiv = document.getElementById('my-orders');
        myOrdersDiv.innerHTML = '暂无订单';

        database.ref('orders').on('child_added', snapshot => {
            const order = snapshot.val();
            const div = document.createElement('div');
            div.className = 'order-item';
            const statusMap = {
                new: '⏳ 等待接单',
                accepted: '👩‍🍳 妈妈已接单',
                rejected: '❌ 今天没有',
                done: '✅ 已做好'
            };
            const statusText = statusMap[order.status] || order.status;
            const statusClass = `status-${order.status}`;
            let detail = `<strong>${order.dish}</strong>`;
            if (order.note) detail += `<div style="color:#888;font-size:12px;">📝 ${order.note}</div>`;
            detail += `<div style="color:#888;font-size:12px;">${order.time}</div>`;
            div.innerHTML = `
                <div>${detail}</div>
                <span class="status-badge ${statusClass}">${statusText}</span>
            `;
            myOrdersDiv.prepend(div);

            database.ref('orders/' + snapshot.key).on('child_changed', () => {
                refreshAllOrders();
            });
        });

        function refreshAllOrders() {
            database.ref('orders').once('value', snapshot => {
                myOrdersDiv.innerHTML = '';
                if (!snapshot.exists()) {
                    myOrdersDiv.innerHTML = '暂无订单';
                    return;
                }
                const orders = [];
                snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
                orders.reverse().forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'order-item';
                    const statusMap = {
                        new: '⏳ 等待接单',
                        accepted: '👩‍🍳 妈妈已接单',
                        rejected: '❌ 今天没有',
                        done: '✅ 已做好'
                    };
                    const statusText = statusMap[order.status] || order.status;
                    const statusClass = `status-${order.status}`;
                    let detail = `<strong>${order.dish}</strong>`;
                    if (order.note) detail += `<div style="color:#888;font-size:12px;">📝 ${order.note}</div>`;
                    detail += `<div style="color:#888;font-size:12px;">${order.time}</div>`;
                    div.innerHTML = `
                        <div>${detail}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    `;
                    myOrdersDiv.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
