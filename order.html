<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 20px auto; padding: 0 15px; background: #fffaf5; }
        h2 { text-align: center; color: #FF6B35; }
        .menu-item { background: white; padding: 15px; margin: 12px 0; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .qty-btn { background: #eee; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .qty-btn:active { background: #ddd; }
        .order-btn { background: #FF6B35; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .order-btn:active { background: #e55a2b; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 999; }
        .my-order { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .order-status { padding: 6px 12px; border-radius: 20px; font-size: 12px; color: white; }
        .status-new { background: #ff9800; }
        .status-accepted { background: #2196F3; }
        .status-rejected { background: #f44336; }
        .status-done { background: #4CAF50; }
    </style>
</head>
<body>
    <h2>🍽️ 想吃啥？点一下</h2>
    <div id="menu-container"></div>

    <div class="my-order">
        <h3 style="margin-top:0;">📋 我的订单</h3>
        <div id="my-orders"><p style="color:#999;">暂无订单</p></div>
    </div>

    <div id="toast">已下单，妈妈马上看到～</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const menu = [
            { name: "红烧排骨", emoji: "🍖" },
            { name: "番茄炒蛋", emoji: "🍅" },
            { name: "酸辣土豆丝", emoji: "🥔" },
            { name: "可乐鸡翅", emoji: "🍗" },
            { name: "玉米炒火腿", emoji: "🌽" },
            { name: "紫菜蛋花汤", emoji: "🍲" },
            { name: "红烧猪脚", emoji: "🐷" }
        ];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '已下单，妈妈马上看到～';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function order(dishName, qty, note) {
            database.ref('orders').push({
                dish: dishName,
                quantity: qty,
                note: note,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new'
            });
            showToast();
        }

        // 生成菜单
        const container = document.getElementById('menu-container');
        menu.forEach(dish => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `
                <div style="display:flex;align-items:center;gap:10px;">
                    <span style="font-size:30px;">${dish.emoji}</span>
                    <span style="font-size:18px;font-weight:bold;">${dish.name}</span>
                </div>
            `;

            const controlDiv = document.createElement('div');
            controlDiv.style.display = 'flex';
            controlDiv.style.alignItems = 'center';
            controlDiv.style.gap = '10px';
            controlDiv.style.marginTop = '10px';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'qty-btn';
            minusBtn.textContent = '−';
            const qtySpan = document.createElement('span');
            qtySpan.textContent = '1';
            qtySpan.style.fontSize = '16px';
            const plusBtn = document.createElement('button');
            plusBtn.className = 'qty-btn';
            plusBtn.textContent = '+';

            let quantity = 1;
            plusBtn.onclick = () => { quantity++; qtySpan.textContent = quantity; };
            minusBtn.onclick = () => { if (quantity > 1) { quantity--; qtySpan.textContent = quantity; } };

            controlDiv.appendChild(minusBtn);
            controlDiv.appendChild(qtySpan);
            controlDiv.appendChild(plusBtn);
            div.appendChild(controlDiv);

            const noteInput = document.createElement('input');
            noteInput.type = 'text';
            noteInput.placeholder = '备注，如：少辣、不要葱';
            noteInput.style.cssText = 'width:100%;margin-top:10px;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;';
            div.appendChild(noteInput);

            const orderBtn = document.createElement('button');
            orderBtn.className = 'order-btn';
            orderBtn.textContent = '下单';
            orderBtn.onclick = () => {
                order(dish.name, quantity, noteInput.value);
                quantity = 1;
                qtySpan.textContent = '1';
                noteInput.value = '';
            };
            div.appendChild(orderBtn);

            container.appendChild(div);
        });

        // 实时显示我的订单（最近10条）
        const myOrdersDiv = document.getElementById('my-orders');
        database.ref('orders').limitToLast(10).on('value', snapshot => {
            myOrdersDiv.innerHTML = '';
            if (!snapshot.exists()) {
                myOrdersDiv.innerHTML = '<p style="color:#999;">暂无订单</p>';
                return;
            }
            const orders = [];
            snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
            orders.reverse().forEach(order => {
                const statusMap = {
                    new: '⏳ 等待接单',
                    accepted: '👩‍🍳 妈妈已接单',
                    rejected: '❌ 今天没有',
                    done: '✅ 已做好'
                };
                const statusClass = `status-${order.status}`;
                const card = document.createElement('div');
                card.style.cssText = 'border-bottom:1px solid #eee;padding:10px 0;display:flex;justify-content:space-between;align-items:center;';
                card.innerHTML = `
                    <div>
                        <strong>${order.dish}</strong> ×${order.quantity || 1}
                        ${order.note ? `<div style="color:#888;font-size:12px;">备注：${order.note}</div>` : ''}
                        <div style="color:#aaa;font-size:12px;">${order.time}</div>
                    </div>
                    <span class="order-status ${statusClass}">${statusMap[order.status] || order.status}</span>
                `;
                myOrdersDiv.appendChild(card);
            });
        });
    </script>
</body>
</html>
