<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 20px auto; padding: 0 15px; }
        .menu-item { background: #f8f8f8; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #FF6B35; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-size: 16px; }
        button:active { background: #e55a2b; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 999; }
    </style>
</head>
<body>
    <h2>想吃啥点一下就OK</h2>
    <div id="menu-container"></div>
    <div id="toast">已下单</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        // 把你刚才复制的那个 firebase 网址，粘贴到下面引号里，替换掉现在这个
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 在这改菜单，把你家爱吃的菜替换进去，注意每道菜加引号，中间用逗号
        const menu = [
            "红烧排骨",
            "番茄炒蛋",
            "酸辣土豆丝",
            "可乐鸡翅",
            "玉米炒火腿",
            "紫菜蛋花汤",
          ＂玉米炒火腿＂,
          ＂红烧猪脚＂
        ];

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function order(dish) {
            database.ref('orders').push({
                dish: dish,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new'
            });
            showToast();
        }

        const container = document.getElementById('menu-container');
        menu.forEach(dish => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span style="font-size:18px;">${dish}</span>`;
            const btn = document.createElement('button');
            btn.textContent = '点这个';
            btn.onclick = () => order(dish);
            div.appendChild(btn);
            container.appendChild(div);
        });
    </script>
</body>
</html>
