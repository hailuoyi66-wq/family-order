<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #eef5ff; max-width: 450px; margin: 0 auto; padding: 20px 15px; color: #1e293b; }
        h2 { text-align: center; color: #1e40af; font-size: 24px; margin-bottom: 15px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); transition: transform 0.1s; }
        .card:active { transform: scale(0.99); }
        .menu-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .menu-name { font-size: 17px; font-weight: 600; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #334155; cursor: pointer; transition: all 0.15s; }
        .qty-btn:active { transform: scale(0.9); background: #cbd5e1; }
        .qty-num { font-size: 16px; min-width: 28px; text-align: center; font-weight: 500; cursor: pointer; padding: 4px 6px; border-radius: 8px; transition: background 0.2s; }
        .qty-num:hover { background: #f1f5f9; }
        .note-input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; margin-top: 5px; background: #f8fafc; }
        .note-input:focus { outline: none; border-color: #2563EB; }
        .custom-header { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; color: #1e40af; }
        .custom-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .custom-row input[type="text"] { flex: 2; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .custom-row .note-input { flex: 1.5; min-width: 100px; }
        .btn-sm { padding: 7px 16px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
        .btn-sm:active { transform: scale(0.95); }
        .btn-add { background: #2563EB; color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.4); }
        .btn-delete { background: #fee2e2; color: #b91c1c; }
        .btn-submit { background: #2563EB; color: white; border: none; padding: 14px; border-radius: 25px; font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; margin: 15px 0 20px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: all 0.2s; }
        .btn-submit:active { transform: scale(0.97); background: #1d4ed8; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; display: none; z-index: 999; }
        .order-section { margin-top: 20px; }
        .order-item { background: white; border-radius: 12px; padding: 12px 15px; margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .order-detail { flex: 1; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; font-weight: 500; }
        .status-new { background: #f59e0b; }
        .status-accepted { background: #2563EB; }
        .status-rejected { background: #ef4444; }
        .status-done { background: #10b981; }
        .pull-refresh { text-align: center; padding: 10px; color: #64748b; font-size: 14px; display: none; align-items: center; justify-content: center; gap: 8px; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #cbd5e1; border-top: 2px solid #2563EB; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .history-toggle { background: #f1f5f9; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-top: 15px; font-size: 15px; cursor: pointer; color: #475569; transition: background 0.2s; }
        .history-toggle:active { background: #e2e8f0; }
        .archive-btn { background: #64748b; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-top: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .archive-btn:active { transform: scale(0.97); background: #475569; }
    </style>
</head>
<body>
    <h2>🛒 今天想吃什么？</h2>
    <div class="pull-refresh" id="pull-refresh">
        <div class="spinner" id="refresh-spinner"></div>
        <span id="refresh-text">下拉刷新</span>
    </div>
    <div id="menu-container"></div>

    <div class="card">
        <div class="custom-header">✏️ 自定义菜品</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="new-custom-name" placeholder="输入菜名" style="flex:2;">
            <button class="btn-sm btn-add" id="add-custom-btn">➕ 添加</button>
        </div>
        <div id="custom-list"></div>
    </div>

    <button class="btn-submit" id="submit-all">🚀 一键下单</button>

    <div class="order-section">
        <h3 style="font-size:18px; color:#1e40af; margin-bottom:10px;">📋 进行中</h3>
        <div id="active-orders">暂无进行中的订单</div>

        <button class="history-toggle" id="toggle-history">📜 查看历史记录</button>
        <div id="history-orders" style="display:none; margin-top:10px;"></div>
        
        <button class="archive-btn" id="archive-done">🗃️ 归档已完成/已拒绝</button>
    </div>

    <div id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const SENDKEY = "SCT374453T20ILwoLTxUBmaj7kw17ItcBZ";

        const menu = [
            "红烧排骨", "番茄炒蛋", "酸辣土豆丝", "可乐鸡翅", "玉米炒火腿",
            "紫菜蛋花汤", "红烧猪脚", "鱼香肉丝", "宫保鸡丁", "回锅肉",
            "地三鲜", "麻婆豆腐", "青椒肉丝", "蒜蓉西兰花", "干煸豆角"
        ];

        const menuData = {};
        menu.forEach(dish => { menuData[dish] = { qty: 0, note: '' }; });
        const customDishes = [];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function sendWechatMsg(summaryLines) {
            if (!SENDKEY || SENDKEY === "SCTxxxxxxxxxxxxx") return;
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://sctapi.ftqq.com/' + SENDKEY + '.send', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const desp = '**新订单**\n\n' + summaryLines.join('\n') + '\n\n时间：' + now;
            xhr.send('title=' + encodeURIComponent('🍽️ 新订单') + '&desp=' + encodeURIComponent(desp));
        }

        function pushOrder(dish, note) {
            return database.ref('orders').push({
                dish: dish,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new',
                note: note || ''
            });
        }

        // 渲染菜单
        const menuContainer = document.getElementById('menu-container');
        menu.forEach(dish => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="menu-row">
                    <span class="menu-name">${dish}</span>
                    <div class="qty-control">
                        <button class="qty-btn minus-btn">−</button>
                        <span class="qty-num" data-dish="${dish}">0</span>
                        <button class="qty-btn plus-btn">+</button>
                    </div>
                </div>
                <input type="text" class="note-input" placeholder="备注" data-dish="${dish}">
            `;
            const minusBtn = card.querySelector('.minus-btn');
            const plusBtn = card.querySelector('.plus-btn');
            const numSpan = card.querySelector('.qty-num');
            const noteInput = card.querySelector('.note-input');

            minusBtn.onclick = () => {
                if (menuData[dish].qty > 0) {
                    menuData[dish].qty--;
                    numSpan.textContent = menuData[dish].qty;
                }
            };
            plusBtn.onclick = () => {
                menuData[dish].qty++;
                numSpan.textContent = menuData[dish].qty;
            };
            numSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                const newQty = prompt(`输入 ${dish} 的数量`, menuData[dish].qty);
                if (newQty !== null) {
                    const num = parseInt(newQty);
                    if (!isNaN(num) && num >= 0) {
                        menuData[dish].qty = num;
                        numSpan.textContent = num;
                    }
                }
            });
            noteInput.oninput = (e) => {
                menuData[dish].note = e.target.value.trim();
            };

            menuContainer.appendChild(card);
        });

        // 自定义菜
        document.getElementById('add-custom-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('new-custom-name');
            const name = nameInput.value.trim();
            if (!name) { showToast('请输入菜名'); return; }
            if (customDishes.some(cd => cd.name === name)) { showToast('已添加过这道菜'); return; }
            customDishes.push({ name, qty: 0, note: '' });
            nameInput.value = '';
            renderCustomList();
        });

        function renderCustomList() {
            const listDiv = document.getElementById('custom-list');
            listDiv.innerHTML = '';
            customDishes.forEach((cd, index) => {
                const row = document.createElement('div');
                row.className = 'custom-row';
                row.innerHTML = `
                    <span style="font-weight:500; flex:1;">${cd.name}</span>
                    <div class="qty-control">
                        <button class="qty-btn cust-minus">−</button>
                        <span class="qty-num cust-num">${cd.qty}</span>
                        <button class="qty-btn cust-plus">+</button>
                    </div>
                    <input type="text" class="note-input" placeholder="备注" value="${cd.note}" style="flex:1.5;">
                    <button class="btn-sm btn-delete cust-delete">删除</button>
                `;
                const minusBtn = row.querySelector('.cust-minus');
                const plusBtn = row.querySelector('.cust-plus');
                const numSpan = row.querySelector('.cust-num');
                const noteInput = row.querySelector('.note-input');
                const deleteBtn = row.querySelector('.cust-delete');

                minusBtn.onclick = () => {
                    if (cd.qty > 0) { cd.qty--; numSpan.textContent = cd.qty; }
                };
                plusBtn.onclick = () => { cd.qty++; numSpan.textContent = cd.qty; };
                numSpan.addEventListener('click', () => {
                    const newQty = prompt(`输入 ${cd.name} 的数量`, cd.qty);
                    if (newQty !== null) {
                        const num = parseInt(newQty);
                        if (!isNaN(num) && num >= 0) {
                            cd.qty = num;
                            numSpan.textContent = num;
                        }
                    }
                });
                noteInput.oninput = (e) => { cd.note = e.target.value.trim(); };
                deleteBtn.onclick = () => {
                    customDishes.splice(index, 1);
                    renderCustomList();
                };

                listDiv.appendChild(row);
            });
        }

        // 一键下单
        document.getElementById('submit-all').addEventListener('click', () => {
            const promises = [];
            const summary = [];

            menu.forEach(dish => {
                const { qty, note } = menuData[dish];
                if (qty > 0) {
                    summary.push(dish + ' ×' + qty + (note ? ' (备注: ' + note + ')' : ''));
                    for (let i = 0; i < qty; i++) promises.push(pushOrder(dish, note));
                }
            });
            customDishes.forEach(cd => {
                if (cd.qty > 0) {
                    summary.push(cd.name + ' ×' + cd.qty + (cd.note ? ' (备注: ' + cd.note + ')' : ''));
                    for (let i = 0; i < cd.qty; i++) promises.push(pushOrder(cd.name, cd.note));
                }
            });

            if (promises.length === 0) {
                showToast('请至少选一道菜！');
                return;
            }

            Promise.all(promises).then(() => {
                showToast('已下单，微信已提醒妈妈');
                sendWechatMsg(summary);
                menu.forEach(d => { menuData[d].qty = 0; menuData[d].note = ''; });
                customDishes.length = 0;
                document.getElementById('custom-list').innerHTML = '';
                document.querySelectorAll('.qty-num').forEach(sp => sp.textContent = '0');
                document.querySelectorAll('.note-input').forEach(inp => inp.value = '');
            }).catch(err => showToast('下单失败: ' + err.message));
        });

        // 下拉刷新
        const pullRefresh = document.getElementById('pull-refresh');
        const refreshText = document.getElementById('refresh-text');
        const refreshSpinner = document.getElementById('refresh-spinner');
        let startY = 0;
        document.addEventListener('touchstart', e => { if (window.scrollY === 0) startY = e.touches[0].clientY; });
        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0 && e.touches[0].clientY - startY > 50) {
                pullRefresh.style.display = 'flex';
                refreshText.textContent = '释放刷新';
            }
        });
        document.addEventListener('touchend', () => {
            if (refreshText.textContent === '释放刷新') {
                refreshText.textContent = '刷新中...';
                refreshSpinner.style.display = 'block';
                setTimeout(() => window.location.reload(), 400);
            }
            pullRefresh.style.display = 'none';
            refreshSpinner.style.display = 'none';
        });

        // 🔥 核心修复：用 child_added 逐条添加，彻底解决多份只显示一条的问题
        const activeDiv = document.getElementById('active-orders');
        const historyDiv = document.getElementById('history-orders');

        function createOrderCard(key, order) {
            const div = document.createElement('div');
            div.className = 'order-item';
            div.id = 'order-' + key;
            const statusMap = { new: '⏳ 等待接单', accepted: '👩‍🍳 已接单', rejected: '❌ 没有', done: '✅ 已做好' };
            const status = statusMap[order.status] || order.status;
            div.innerHTML = `
                <div class="order-detail">
                    <strong>${order.dish}</strong>
                    ${order.note ? `<div style="color:#64748b; font-size:13px;">📝 ${order.note}</div>` : ''}
                    <div style="color:#94a3b8; font-size:12px;">${order.time}</div>
                </div>
                <span class="status-badge status-${order.status}">${status}</span>
            `;
            return div;
        }

        function placeCard(key, order) {
            const card = createOrderCard(key, order);
            if (order.status === 'new' || order.status === 'accepted') {
                activeDiv.prepend(card);
                // 移除“暂无”占位文字
                if (activeDiv.querySelector('p')) activeDiv.innerHTML = '';
            } else {
                historyDiv.prepend(card);
                if (historyDiv.querySelector('p')) historyDiv.innerHTML = '';
            }
        }

        // 监听新增
        database.ref('orders').on('child_added', snapshot => {
            placeCard(snapshot.key, snapshot.val());
        });

        // 监听状态变化
        database.ref('orders').on('child_changed', snapshot => {
            const key = snapshot.key;
            const oldCard = document.getElementById('order-' + key);
            if (oldCard) {
                const newCard = createOrderCard(key, snapshot.val());
                oldCard.replaceWith(newCard);
                // 重新调整位置：如果状态变了，挪到对应区域
                const order = snapshot.val();
                const currentCard = document.getElementById('order-' + key);
                if (currentCard) {
                    currentCard.remove();
                    placeCard(key, order);
                }
            }
        });

        // 监听删除
        database.ref('orders').on('child_removed', snapshot => {
            const card = document.getElementById('order-' + snapshot.key);
            if (card) card.remove();
        });

        // 归档功能（和B端一致）
        document.getElementById('archive-done').addEventListener('click', () => {
            const archiveRef = database.ref('archived_orders');
            database.ref('orders').once('value', snapshot => {
                const updates = {};
                const deletions = {};
                snapshot.forEach(child => {
                    const order = child.val();
                    if (order.status === 'done' || order.status === 'rejected') {
                        const newKey = archiveRef.push().key;
                        updates['archived_orders/' + newKey] = order;
                        deletions['orders/' + child.key] = null;
                    }
                });
                if (Object.keys(updates).length === 0) {
                    showToast('没有可归档的订单');
                    return;
                }
                database.ref().update({...updates, ...deletions}).then(() => {
                    showToast('归档成功！');
                }).catch(err => {
                    showToast('归档失败：' + err.message);
                });
            });
        });

        // 历史记录折叠
        document.getElementById('toggle-history').addEventListener('click', function() {
            const hist = document.getElementById('history-orders');
            if (hist.style.display === 'none') {
                hist.style.display = 'block';
                this.textContent = '📜 收起历史记录';
            } else {
                hist.style.display = 'none';
                this.textContent = '📜 查看历史记录';
            }
        });
    </script>
</body>
</html>
