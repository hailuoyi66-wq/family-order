<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #eef5ff; max-width: 450px; margin: 0 auto; padding: 20px 15px; color: #1e293b; }
        h2 { text-align: center; color: #1e40af; font-size: 24px; margin-bottom: 15px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .menu-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .menu-name { font-size: 17px; font-weight: 600; }
        .qty-control { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #334155; cursor: pointer; transition: background 0.2s; }
        .qty-btn:active { background: #cbd5e1; }
        .qty-num { font-size: 16px; min-width: 20px; text-align: center; font-weight: 500; }
        .note-input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; margin-top: 5px; background: #f8fafc; }
        .note-input:focus { outline: none; border-color: #2563EB; }
        .custom-header { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; color: #1e40af; }
        .custom-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .custom-row input[type="text"] { flex: 2; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: #f8fafc; }
        .custom-row .note-input { flex: 1.5; min-width: 100px; }
        .btn-sm { padding: 6px 14px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; }
        .btn-add { background: #2563EB; color: white; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }
        .btn-submit { background: #2563EB; color: white; border: none; padding: 14px; border-radius: 25px; font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; margin: 15px 0 20px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: background 0.2s; }
        .btn-submit:active { background: #1d4ed8; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; display: none; z-index: 999; }
        .order-section { margin-top: 20px; }
        .order-item { background: white; border-radius: 12px; padding: 12px 15px; margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; }
        .order-detail { flex: 1; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; font-weight: 500; }
        .status-new { background: #f59e0b; }
        .status-accepted { background: #2563EB; }
        .status-rejected { background: #ef4444; }
        .status-done { background: #10b981; }
        .pull-refresh { text-align: center; padding: 8px; color: #64748b; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <h2>🛒 今天想吃什么？</h2>
    <div class="pull-refresh" id="pull-refresh">下拉刷新</div>
    <div id="menu-container"></div>

    <!-- 自定义菜区域 -->
    <div class="card">
        <div class="custom-header">✏️ 自定义菜品</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="new-custom-name" placeholder="输入菜名" style="flex:2;">
            <button class="btn-sm btn-add" id="add-custom-btn">添加</button>
        </div>
        <div id="custom-list"></div>
    </div>

    <!-- 一键下单 -->
    <button class="btn-submit" id="submit-all">🚀 一键下单</button>

    <!-- 我的订单 -->
    <div class="order-section">
        <h3 style="font-size:18px; color:#1e40af; margin-bottom:10px;">📋 我的订单</h3>
        <div id="my-orders">暂无订单</div>
    </div>

    <div id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const SENDKEY = "SCT374453T20ILwoLTxUBmaj7kw17ItcBZ";

        const menu = [
            "红烧排骨", "番茄炒蛋", "酸辣土豆丝", "可乐鸡翅", "玉米炒火腿",
            "紫菜蛋花汤", "红烧猪脚", "鱼香肉丝", "宫保鸡丁", "回锅肉",
            "地三鲜", "麻婆豆腐", "青椒肉丝", "蒜蓉西兰花", "干煸豆角"
        ];

        // 存储数据：菜单数量、菜单备注、自定义菜列表
        const menuData = {};
        menu.forEach(dish => { menuData[dish] = { qty: 0, note: '' }; });
        const customDishes = [];  // { name, qty, note }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function sendWechatMsg(summaryLines) {
            if (!SENDKEY || SENDKEY === "SCTxxxxxxxxxxxxx") return;
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://sctapi.ftqq.com/' + SENDKEY + '.send', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const desp = '**新订单**\n\n' + summaryLines.join('\n') + '\n\n时间：' + now;
            xhr.send('title=' + encodeURIComponent('🍽️ 新订单') + '&desp=' + encodeURIComponent(desp));
        }

        function pushOrder(dish, note) {
            return database.ref('orders').push({
                dish: dish,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new',
                note: note || ''
            });
        }

        // 渲染菜单
        const menuContainer = document.getElementById('menu-container');
        menu.forEach(dish => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="menu-row">
                    <span class="menu-name">${dish}</span>
                    <div class="qty-control">
                        <button class="qty-btn minus-btn">−</button>
                        <span class="qty-num">0</span>
                        <button class="qty-btn plus-btn">+</button>
                    </div>
                </div>
                <input type="text" class="note-input" placeholder="备注，如：少辣" data-dish="${dish}">
            `;
            const minusBtn = card.querySelector('.minus-btn');
            const plusBtn = card.querySelector('.plus-btn');
            const numSpan = card.querySelector('.qty-num');
            const noteInput = card.querySelector('.note-input');

            minusBtn.onclick = () => {
                if (menuData[dish].qty > 0) {
                    menuData[dish].qty--;
                    numSpan.textContent = menuData[dish].qty;
                }
            };
            plusBtn.onclick = () => {
                menuData[dish].qty++;
                numSpan.textContent = menuData[dish].qty;
            };
            noteInput.oninput = (e) => {
                menuData[dish].note = e.target.value.trim();
            };

            menuContainer.appendChild(card);
        });

        // 自定义菜添加逻辑
        document.getElementById('add-custom-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('new-custom-name');
            const name = nameInput.value.trim();
            if (!name) { showToast('请输入菜名'); return; }
            if (customDishes.some(cd => cd.name === name)) { showToast('已添加过这道菜'); return; }
            customDishes.push({ name, qty: 0, note: '' });
            nameInput.value = '';
            renderCustomList();
        });

        function renderCustomList() {
            const listDiv = document.getElementById('custom-list');
            listDiv.innerHTML = '';
            customDishes.forEach((cd, index) => {
                const row = document.createElement('div');
                row.className = 'custom-row';
                row.innerHTML = `
                    <span style="font-weight:500; flex:1;">${cd.name}</span>
                    <div class="qty-control">
                        <button class="qty-btn cust-minus">−</button>
                        <span class="qty-num">${cd.qty}</span>
                        <button class="qty-btn cust-plus">+</button>
                    </div>
                    <input type="text" class="note-input" placeholder="备注" value="${cd.note}" style="flex:1.5;">
                    <button class="btn-sm btn-delete cust-delete">删除</button>
                `;
                const minusBtn = row.querySelector('.cust-minus');
                const plusBtn = row.querySelector('.cust-plus');
                const numSpan = row.querySelector('.qty-num');
                const noteInput = row.querySelector('.note-input');
                const deleteBtn = row.querySelector('.cust-delete');

                minusBtn.onclick = () => {
                    if (cd.qty > 0) { cd.qty--; numSpan.textContent = cd.qty; }
                };
                plusBtn.onclick = () => { cd.qty++; numSpan.textContent = cd.qty; };
                noteInput.oninput = (e) => { cd.note = e.target.value.trim(); };
                deleteBtn.onclick = () => {
                    customDishes.splice(index, 1);
                    renderCustomList();
                };

                listDiv.appendChild(row);
            });
        }

        // 一键下单
        document.getElementById('submit-all').addEventListener('click', () => {
            const promises = [];
            const summary = [];

            menu.forEach(dish => {
                const { qty, note } = menuData[dish];
                if (qty > 0) {
                    summary.push(dish + ' ×' + qty + (note ? ' (备注: ' + note + ')' : ''));
                    for (let i = 0; i < qty; i++) promises.push(pushOrder(dish, note));
                }
            });
            customDishes.forEach(cd => {
                if (cd.qty > 0) {
                    summary.push(cd.name + ' ×' + cd.qty + (cd.note ? ' (备注: ' + cd.note + ')' : ''));
                    for (let i = 0; i < cd.qty; i++) promises.push(pushOrder(cd.name, cd.note));
                }
            });

            if (promises.length === 0) {
                showToast('请至少选一道菜！');
                return;
            }

            Promise.all(promises).then(() => {
                showToast('已下单，微信已提醒妈妈');
                sendWechatMsg(summary);
                // 重置
                menu.forEach(d => { menuData[d].qty = 0; menuData[d].note = ''; });
                customDishes.length = 0;
                document.getElementById('custom-list').innerHTML = '';
                // 重置所有DOM显示
                document.querySelectorAll('.qty-num').forEach(sp => sp.textContent = '0');
                document.querySelectorAll('.note-input').forEach(inp => inp.value = '');
            }).catch(err => showToast('下单失败: ' + err.message));
        });

        // 下拉刷新
        const pullRefresh = document.getElementById('pull-refresh');
        let startY = 0;
        document.addEventListener('touchstart', e => { if (window.scrollY === 0) startY = e.touches[0].clientY; });
        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0 && e.touches[0].clientY - startY > 50) {
                pullRefresh.style.display = 'block'; pullRefresh.textContent = '释放刷新';
            }
        });
        document.addEventListener('touchend', e => {
            if (pullRefresh.textContent === '释放刷新') {
                pullRefresh.textContent = '刷新中...';
                setTimeout(() => window.location.reload(), 300);
            }
            pullRefresh.style.display = 'none';
        });

        // 实时订单
        const myOrdersDiv = document.getElementById('my-orders');
        myOrdersDiv.innerHTML = '暂无订单';
        database.ref('orders').on('child_added', snap => {
            const order = snap.val();
            const div = document.createElement('div');
            div.className = 'order-item';
            const statusMap = { new: '⏳ 等待接单', accepted: '👩‍🍳 已接单', rejected: '❌ 没有', done: '✅ 已做好' };
            const status = statusMap[order.status] || order.status;
            div.innerHTML = `
                <div class="order-detail">
                    <strong>${order.dish}</strong>
                    ${order.note ? `<div style="color:#64748b; font-size:13px;">📝 ${order.note}</div>` : ''}
                    <div style="color:#94a3b8; font-size:12px;">${order.time}</div>
                </div>
                <span class="status-badge status-${order.status}">${status}</span>
            `;
            myOrdersDiv.prepend(div);
        });
    </script>
</body>
</html>
