<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我想吃的菜</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 20px auto; padding: 0 15px; background: #fffaf5; }
        h2 { text-align: center; color: #FF6B35; }
        .menu-item { background: white; padding: 15px; margin: 12px 0; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        button { background: #FF6B35; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 5px; }
        button:active { background: #e55a2b; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 999; }
        .my-order { background: #fff; border-radius: 15px; padding: 15px; margin-top: 20px; }
        .order-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; }
        .status-new { background: #ff9800; }
        .status-accepted { background: #2196F3; }
        .status-rejected { background: #f44336; }
        .status-done { background: #4CAF50; }
        .pull-refresh { text-align: center; padding: 8px; color: #999; font-size: 14px; display: none; }
        .note-input { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2>🍽️ 想吃啥？</h2>
    <div class="pull-refresh" id="pull-refresh">下拉刷新</div>
    <div id="menu-container"></div>
    
    <div class="my-order">
        <h3>📋 我的订单</h3>
        <div id="my-orders">加载中...</div>
    </div>

    <div id="toast">已下单！</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://diancai-fecb0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const SENDKEY = "SCT374453T20ILwoLTxUBmaj7kw17ItcBZ";

        const menu = [
            "红烧排骨", "番茄炒蛋", "酸辣土豆丝", "可乐鸡翅", "玉米炒火腿",
            "紫菜蛋花汤", "红烧猪脚", "鱼香肉丝", "宫保鸡丁", "回锅肉",
            "地三鲜", "麻婆豆腐", "青椒肉丝", "蒜蓉西兰花", "干煸豆角"
        ];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '已下单！';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function sendWechatMsg(dish, note) {
            if (!SENDKEY || SENDKEY === "SCTxxxxxxxxxxxxx") return;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://sctapi.ftqq.com/' + SENDKEY + '.send', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            var desp = '**' + dish + '**\n\n时间：' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
            if (note) desp += '\n备注：' + note;
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var result = JSON.parse(xhr.responseText);
                        if (result.code === 0) {
                            showToast('已下单，微信已提醒妈妈');
                        } else {
                            showToast('下单成功，但微信推送失败：' + (result.message || '未知错误'));
                        }
                    } catch (e) {
                        showToast('下单成功，但微信推送异常');
                    }
                }
            };
            var data = 'title=' + encodeURIComponent('🍽️ 新订单') + '&desp=' + encodeURIComponent(desp);
            xhr.send(data);
        }

        function order(dish, note) {
            database.ref('orders').push({
                dish: dish,
                time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
                status: 'new',
                note: note || ''
            }).then(() => {
                showToast('已下单，正在通知妈妈...');
                sendWechatMsg(dish, note);
            }).catch(err => {
                showToast('下单失败：' + err.message);
            });
        }

        // 生成菜单（带备注输入框）
        const container = document.getElementById('menu-container');
        menu.forEach(dish => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<span style="font-size:18px;">${dish}</span>`;

            // 备注输入框
            const noteInput = document.createElement('input');
            noteInput.type = 'text';
            noteInput.className = 'note-input';
            noteInput.placeholder = '备注，如：少辣、不要葱';
            div.appendChild(noteInput);

            const btn = document.createElement('button');
            btn.textContent = '点这个';
            btn.onclick = function() {
                order(dish, noteInput.value.trim());
                noteInput.value = ''; // 清空备注
            };
            div.appendChild(btn);
            container.appendChild(div);
        });

        // 下拉刷新
        const pullRefresh = document.getElementById('pull-refresh');
        let startY = 0;
        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) startY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0) {
                const currentY = e.touches[0].clientY;
                if (currentY - startY > 50) {
                    pullRefresh.style.display = 'block';
                    pullRefresh.textContent = '释放刷新';
                } else {
                    pullRefresh.style.display = 'none';
                }
            }
        });
        document.addEventListener('touchend', e => {
            if (pullRefresh.textContent === '释放刷新') {
                pullRefresh.textContent = '刷新中...';
                setTimeout(() => window.location.reload(), 300);
            }
            pullRefresh.style.display = 'none';
        });

        // 订单监听
        const myOrdersDiv = document.getElementById('my-orders');
        myOrdersDiv.innerHTML = '暂无订单';

        database.ref('orders').on('child_added', snapshot => {
            const order = snapshot.val();
            const div = document.createElement('div');
            div.className = 'order-item';
            const statusMap = {
                new: '⏳ 等待接单',
                accepted: '👩‍🍳 妈妈已接单',
                rejected: '❌ 今天没有',
                done: '✅ 已做好'
            };
            const statusText = statusMap[order.status] || order.status;
            const statusClass = `status-${order.status}`;
            let detail = `<strong>${order.dish}</strong>`;
            if (order.note) detail += `<div style="color:#888;font-size:12px;">📝 ${order.note}</div>`;
            detail += `<div style="color:#888;font-size:12px;">${order.time}</div>`;
            div.innerHTML = `
                <div>${detail}</div>
                <span class="status-badge ${statusClass}">${statusText}</span>
            `;
            myOrdersDiv.prepend(div);

            database.ref('orders/' + snapshot.key).on('child_changed', () => {
                refreshAllOrders();
            });
        });

        function refreshAllOrders() {
            database.ref('orders').once('value', snapshot => {
                myOrdersDiv.innerHTML = '';
                if (!snapshot.exists()) {
                    myOrdersDiv.innerHTML = '暂无订单';
                    return;
                }
                const orders = [];
                snapshot.forEach(child => orders.push({ key: child.key, ...child.val() }));
                orders.reverse().forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'order-item';
                    const statusMap = {
                        new: '⏳ 等待接单',
                        accepted: '👩‍🍳 妈妈已接单',
                        rejected: '❌ 今天没有',
                        done: '✅ 已做好'
                    };
                    const statusText = statusMap[order.status] || order.status;
                    const statusClass = `status-${order.status}`;
                    let detail = `<strong>${order.dish}</strong>`;
                    if (order.note) detail += `<div style="color:#888;font-size:12px;">📝 ${order.note}</div>`;
                    detail += `<div style="color:#888;font-size:12px;">${order.time}</div>`;
                    div.innerHTML = `
                        <div>${detail}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    `;
                    myOrdersDiv.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
